<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>QRCode 등록 시스템 (오프라인 모드)</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
  <style>
    :root {
      --primary-blue: #1a73e8;
      --dark-blue: #1557b0;
      --light-bg: #f1f3f4;
      --white: #ffffff;
      --gray: #5f6368;
      --error-red: #d93025;
      --light-red: #fce8e6;
      --light-blue: #e8f0fe;
      --success: #34a853;
      --light-green: #e6f4ea;
      --border: #dadce0;
      --edit-gray: #70757a;
    }

    body {
      font-family: sans-serif;
      background-color: var(--light-bg);
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    .card {
      background: var(--white);
      width: 100%;
      max-width: 900px;
      padding: 30px;
      border-radius: 24px;
      box-shadow: 0 15px 50px rgba(0,0,0,0.08);
      box-sizing: border-box;
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 { color: var(--primary-blue); text-align: center; margin-top: 0; font-size: 1.6rem; margin-bottom: 30px; letter-spacing: -0.5px; }

    .main-content {
      display: flex;
      flex-direction: row;
      gap: 30px;
      align-items: stretch;
    }

    .content-left {
      flex: 1;
      min-width: 320px;
      display: flex;
      flex-direction: column;
    }

    .content-right {
      flex: 1.2;
      min-width: 320px;
      display: flex;
      flex-direction: column;
    }

    @media (max-width: 820px) {
      .main-content { flex-direction: column; }
      .card { padding: 25px; }
    }

    .step-box {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      background-color: #ffffff;
      transition: all 0.3s ease;
    }

    .content-left .step-box:last-child {
      margin-bottom: 0;
      flex: 1;
    }

    .disabled {
      opacity: 0.4;
      pointer-events: none;
      background: #fdfdfd;
      border-style: dashed;
    }

    label { font-size: 13px; color: var(--gray); font-weight: 700; display: block; margin-bottom: 8px; }

    select, input {
      width: 100%;
      height: 48px;
      margin-bottom: 15px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      padding: 0 16px;
      box-sizing: border-box;
      outline-color: var(--primary-blue);
      transition: border-color 0.2s;
    }

    select:focus, input:focus { border-color: var(--primary-blue); }
    input:disabled { background-color: #f8f9fa; color: #9aa0a6; cursor: not-allowed; }

    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

    .main-btn {
      width: 100%;
      height: 54px;
      background-color: var(--primary-blue);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .main-btn:hover { filter: brightness(1.1); }
    .main-btn:active { transform: scale(0.98); }
    .btn-stop { background-color: var(--error-red); }
    .btn-edit { background-color: var(--edit-gray); }

    .control-row {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }

    .sub-control-btn {
      flex: 1;
      height: 44px;
      background-color: #f8f9fa;
      color: var(--gray);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .sub-control-btn:hover { background-color: #f1f3f4; }

    .scan-wrapper {
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    #preview-container {
      flex: 1;
      width: 100%;
      background: #f8f9fa;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      border-bottom: 1px solid var(--border);
      min-height: 250px;
    }

    #preview-container.active { background: #000; }

    #camera-placeholder {
      color: var(--gray);
      font-size: 15px;
      text-align: center;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes pulse {
      0% { opacity: 0.4; }
      50% { opacity: 0.7; }
      100% { opacity: 0.4; }
    }

    video { width: 100%; height: 100%; object-fit: cover; display: none; }
    video.active { display: block; }
    .mirror { transform: scaleX(-1); }

    #msg-panel {
      padding: 24px 20px;
      text-align: center;
      font-size: 16px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      min-height: 95px;
      box-sizing: border-box;
      line-height: 1.4;
    }

    .msg-wait { color: #70757a; background-color: #f1f3f4; }
    .msg-ready { color: var(--primary-blue); background-color: var(--light-blue); }
    .msg-success { color: var(--success); background-color: var(--light-green); }

    .download-btn {
      background-color: var(--success);
      margin-top: 30px;
      width: 100%;
      height: 56px;
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .download-btn:hover { filter: brightness(1.05); box-shadow: 0 4px 12px rgba(52, 168, 83, 0.2); }

    .bottom-section {
      margin-top: 25px;
      border-top: 1px solid var(--border);
      padding-top: 20px;
    }

    #list-section {
      margin-top: 20px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #list-section.open { max-height: 500px; overflow-y: auto; }

    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { position: sticky; top: 0; background: #fff; padding: 14px 10px; border-bottom: 2px solid var(--border); z-index: 10; color: var(--gray); font-weight: 800; }
    td { padding: 14px 10px; border-bottom: 1px solid #f1f3f4; text-align: center; }

    .sub-btn {
      background-color: #ffffff;
      color: var(--gray);
      border: 1px solid var(--border);
      height: 46px;
      font-size: 14px;
      padding: 0 20px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      transition: all 0.2s;
    }
    .sub-btn:hover { background-color: #f8f9fa; border-color: var(--gray); }

    #customModal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      z-index: 10000;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(6px);
    }
    .modal-content {
      background: white;
      padding: 32px;
      border-radius: 24px;
      width: 90%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .modal-btns { display: flex; gap: 12px; margin-top: 28px; }
    .btn-cancel { background: #f1f3f4; flex: 1; height: 48px; border: none; border-radius: 12px; color: var(--gray); font-weight: 700; cursor: pointer; }
    .btn-confirm { background: var(--error-red); flex: 1; height: 48px; border: none; color: white; border-radius: 12px; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>

<div class="card">
  <h2>QRCode 등록 시스템</h2>

  <div class="main-content">
    <div class="content-left">
      <div id="step1" class="step-box">
        <div style="display: flex; gap: 12px;">
          <div style="flex:1">
            <label>학년</label>
            <select id="grade">
              <option>1</option><option selected>2</option><option>3</option>
            </select>
          </div>
          <div style="flex:1">
            <label>반</label>
            <select id="classGroup">
              <script>for(let i=1;i<=15;i++) document.write(`<option>${i}</option>`);</script>
            </select>
          </div>
        </div>
        <button id="toggleLockBtn" class="main-btn" onclick="toggleLock()">학급 정보 확정</button>
      </div>

      <div id="step2" class="step-box disabled">
        <label>학생 번호</label>
        <input type="number" id="studentNum" placeholder="번호 입력 (예: 15)" inputmode="numeric" min="1">

        <button id="scanBtn" class="main-btn" onclick="handleScanToggle()">카메라 스캔 시작</button>

        <div class="control-row">
          <button class="sub-control-btn" onclick="toggleMirror()">좌우반전</button>
          <button class="sub-control-btn" onclick="toggleCameraFacing()">전후변경</button>
        </div>

        <div style="margin-top: 24px; text-align: center;">
            <div id="count-display" style="font-size:14px; color:var(--gray); font-weight: 700;">현재 저장된 데이터: 0건</div>
        </div>
      </div>
    </div>

    <div class="content-right">
      <div class="scan-wrapper">
        <div id="preview-container">
          <div id="camera-placeholder">
            <div style="background: #eceef1; padding: 20px; border-radius: 50%; margin-bottom: 5px;">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="color: var(--gray);">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                <circle cx="12" cy="13" r="4"></circle>
              </svg>
            </div>
            <div style="font-weight: 700; color: #a0a4a8;">카메라 연결 대기 중</div>
          </div>
          <video id="v" autoplay playsinline muted></video>
        </div>
        <div id="msg-panel" class="msg-wait">학급 정보를 먼저 확정해 주세요.</div>
      </div>
    </div>
  </div>

  <button class="download-btn" onclick="downloadCSV()">CSV 데이터로 내보내기</button>

  <div class="bottom-section">
    <button id="listToggleBtn" class="sub-btn" onclick="handleListToggle()">
      <span>등록 데이터 목록 확인</span>
      <span id="list-arrow" style="font-size: 12px;">▼</span>
    </button>
    <div id="list-section">
      <table id="dataTable">
        <thead>
          <tr>
            <th>학생 정보</th>
            <th>스캔 일시</th>
            <th>삭제</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<div id="customModal">
  <div class="modal-content">
    <h3 id="modalTitle" style="margin-top:0; color: #202124;">데이터 확인</h3>
    <p id="modalMsg" style="color:var(--gray); line-height:1.5; font-size: 15px;"></p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button id="modalConfirmBtn" class="btn-confirm">확인</button>
    </div>
  </div>
</div>

<script>
  let stream = null;
  let mirroring = true;
  let currentFacingMode = "user";
  let active = false; // 현재 스캔(분석) 중인지 여부
  let isLocked = false;
  let isListOpen = false;

  let savedMap = new Map();
  let pendingData = null;

  window.addEventListener('load', () => {
    if (typeof jsQR === 'undefined') {
      updateMsg("⚠️ jsQR 라이브러리 로드 실패. 인터넷 연결을 확인하세요.", "wait");
    }
  });

  function toggleLock() {
    const btn = document.getElementById('toggleLockBtn');
    const step1Inputs = document.querySelectorAll('#step1 select');
    const step2 = document.getElementById('step2');

    if (!isLocked) {
      isLocked = true;
      btn.innerText = "학급 정보 수정하기";
      btn.classList.add('btn-edit');
      step1Inputs.forEach(el => el.disabled = true);
      step2.classList.remove('disabled');
      updateMsg("학생 번호 입력 후 스캔을 시작하세요.", "ready");
      setTimeout(() => document.getElementById('studentNum').focus(), 200);
    } else {
      isLocked = false;
      if (active) hideCameraView();
      btn.innerText = "학급 정보 확정";
      btn.classList.remove('btn-edit');
      step1Inputs.forEach(el => el.disabled = false);
      step2.classList.add('disabled');
      updateMsg("학급 정보를 먼저 확정해 주세요.", "wait");
    }
  }

  async function handleScanToggle() {
    const btn = document.getElementById('scanBtn');
    const studentInput = document.getElementById('studentNum');

    if (typeof jsQR === 'undefined') {
      showSimpleAlert("QR 인식 엔진이 로드되지 않았습니다.");
      return;
    }

    if (!active) {
      const val = parseInt(studentInput.value);
      if(!val || val < 1) {
        showSimpleAlert("올바른 학생 번호를 먼저 입력해주세요.");
        return;
      }

      studentInput.disabled = true;
      btn.innerText = "스캔 중지하기";
      btn.classList.add('btn-stop');

      try {
        await showCameraView();
      } catch (e) {
        resetScanBtn();
        studentInput.disabled = false;
        showSimpleAlert("카메라 접근 권한이 없거나 장치가 없습니다.");
      }
    } else {
      hideCameraView();
      updateMsg("스캔이 중단되었습니다.", "ready");
    }
  }

  function resetScanBtn() {
    const btn = document.getElementById('scanBtn');
    btn.innerText = "카메라 스캔 시작";
    btn.classList.remove('btn-stop');
  }

  function updateMsg(text, type) {
    const p = document.getElementById('msg-panel');
    p.innerText = text;
    if (type === "wait") p.className = "msg-wait";
    else if (type === "success") p.className = "msg-success";
    else p.className = "msg-ready";
  }

  async function toggleCameraFacing() {
    currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
    mirroring = (currentFacingMode === "user");

    // 카메라 방향을 바꿀 때는 스트림을 새로 받아야 하므로 기존 것을 정지
    if (stream) {
      stream.getTracks().forEach(track => track.stop());
      stream = null;
    }

    if (active) {
      await showCameraView();
    }
  }

  function toggleMirror() {
    mirroring = !mirroring;
    const v = document.getElementById('v');
    if(v) v.className = mirroring ? 'mirror active' : 'active';
  }

  async function showCameraView() {
    // 스트림이 없거나 정지된 경우에만 새로 요청
    if (!stream) {
      const constraints = {
        video: {
          facingMode: currentFacingMode,
          width: { ideal: 1280 },
          height: { ideal: 720 }
        }
      };
      stream = await navigator.mediaDevices.getUserMedia(constraints);
    }

    const v = document.getElementById('v');
    const container = document.getElementById('preview-container');
    const placeholder = document.getElementById('camera-placeholder');

    v.srcObject = stream;
    v.className = mirroring ? 'mirror active' : 'active';
    container.classList.add('active');
    placeholder.style.display = 'none';

    return new Promise((resolve) => {
      v.onloadedmetadata = () => {
        v.play().then(() => {
          active = true;
          updateMsg("QRCode를 카메라에 비춰주세요.", "ready");
          requestAnimationFrame(tick);
          resolve();
        });
      };
    });
  }

  // 스트림을 완전히 끄지 않고, 비디오 요소만 숨기고 분석만 중단함
  function hideCameraView() {
    active = false;
    resetScanBtn();

    const v = document.getElementById('v');
    const container = document.getElementById('preview-container');
    const placeholder = document.getElementById('camera-placeholder');
    const studentInput = document.getElementById('studentNum');

    if(isLocked) studentInput.disabled = false;

    if(v) {
        v.pause();
        // v.srcObject = null; // 스트림을 끊지 않음
        v.classList.remove('active');
    }
    container.classList.remove('active');
    placeholder.style.display = 'flex';
  }

  function tick() {
    if(!active) return;
    const v = document.getElementById('v');
    if(v && v.readyState === v.HAVE_ENOUGH_DATA) {
      const canvas = document.createElement("canvas");
      canvas.width = v.videoWidth; canvas.height = v.videoHeight;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(v, 0, 0, canvas.width, canvas.height);
      const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(img.data, img.width, img.height);
      if(code && code.data) {
        hideCameraView(); // 성공 시 스트림을 유지하며 화면만 숨김
        processScan(code.data);
        return;
      }
    }
    requestAnimationFrame(tick);
  }

  function processScan(qr) {
    const g = document.getElementById('grade').value;
    const c = document.getElementById('classGroup').value;
    const nInput = document.getElementById('studentNum');
    const n = parseInt(nInput.value);

    const compositeKey = `${g}-${c}-${n}`;
    const timeData = getFormattedDateTime();

    const newRecord = { compositeKey, grade: g, classGroup: c, studentNum: n, qrData: qr, time: timeData.display, fullTime: timeData.full };

    if (savedMap.has(compositeKey)) {
      pendingData = newRecord;
      showConfirmModal(`${g}학년 ${c}반 ${n}번 기록이 이미 존재합니다. 덮어쓰시겠습니까?`, () => {
        saveData(newRecord);
      });
    } else {
      saveData(newRecord);
    }
  }

  function saveData(data) {
    savedMap.set(data.compositeKey, data);
    updateMsg(`✅ ${data.grade}-${data.classGroup}-${data.studentNum}번 등록 성공!`, "success");
    if (isListOpen) renderTable();
    else document.getElementById('count-display').innerText = `현재 저장된 데이터: ${savedMap.size}건`;

    const nInput = document.getElementById('studentNum');
    nInput.value = "";
    nInput.disabled = false;
    nInput.focus();
  }

  function getFormattedDateTime() {
    const now = new Date();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    const hour = String(now.getHours()).padStart(2, '0');
    const minute = String(now.getMinutes()).padStart(2, '0');
    const second = String(now.getSeconds()).padStart(2, '0');
    return { display: `${month}/${day} ${hour}:${minute}`, full: `${now.getFullYear()}-${month}-${day} ${hour}:${minute}:${second}` };
  }

  function renderTable() {
    const tbody = document.querySelector('#dataTable tbody');
    tbody.innerHTML = "";
    const sortedData = Array.from(savedMap.values()).sort((a, b) => (a.grade-b.grade || a.classGroup-b.classGroup || a.studentNum-b.studentNum));
    if(sortedData.length === 0) tbody.innerHTML = "<tr><td colspan='3' style='padding:30px; color:var(--gray);'>데이터가 없습니다.</td></tr>";
    sortedData.forEach(row => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${row.grade}-${row.classGroup}-${row.studentNum}</td><td>${row.time}</td><td><button style="color:var(--error-red);border:none;background:none;cursor:pointer;" onclick="handleDelete('${row.compositeKey}')">✕</button></td>`;
      tbody.appendChild(tr);
    });
    document.getElementById('count-display').innerText = `현재 저장된 데이터: ${savedMap.size}건`;
  }

  function handleDelete(key) { showConfirmModal("삭제하시겠습니까?", () => { savedMap.delete(key); renderTable(); }); }

  function handleListToggle() {
    const section = document.getElementById('list-section');
    const arrow = document.getElementById('list-arrow');
    isListOpen = !isListOpen;
    section.classList.toggle('open', isListOpen);
    arrow.innerText = isListOpen ? "▲" : "▼";
    if (isListOpen) renderTable();
  }

  function showConfirmModal(msg, onConfirm) {
    document.getElementById('modalTitle').innerText = "확인";
    document.getElementById('modalMsg').innerText = msg;
    const confirmBtn = document.getElementById('modalConfirmBtn');
    confirmBtn.onclick = () => { onConfirm(); closeModal(); };
    document.getElementById('customModal').style.display = 'flex';
  }

  function showSimpleAlert(msg) {
    document.getElementById('modalTitle').innerText = "알림";
    document.getElementById('modalMsg').innerText = msg;
    const confirmBtn = document.getElementById('modalConfirmBtn');
    confirmBtn.onclick = closeModal;
    document.getElementById('customModal').style.display = 'flex';
  }

  function closeModal() {
    document.getElementById('customModal').style.display = 'none';
    if(isLocked && !active) document.getElementById('studentNum').disabled = false;
  }

  function downloadCSV() {
    if(savedMap.size === 0) return showSimpleAlert("저장된 데이터가 없습니다.");
    const sortedData = Array.from(savedMap.values()).sort((a,b) => (a.grade-b.grade || a.classGroup-b.classGroup || a.studentNum-b.studentNum));
    let csv = "\uFEFF학년,반,번호,QR데이터,등록일시\n";
    sortedData.forEach(r => csv += `${r.grade},${r.classGroup},${r.studentNum},"${r.qrData}",${r.fullTime}\n`);
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
    a.download = `QRCode_Export_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  }

  document.getElementById('studentNum').onkeypress = e => { if(e.key==='Enter') { e.preventDefault(); handleScanToggle(); } };
</script>
</body>
</html>
